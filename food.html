<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>在地美食｜廈門自由行助手</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
<header>🍜 在地美食</header>

<div class="container">
  <div class="card">
    <h2>必吃清單</h2>
    <ul class="list">
      <li>
        <div><div class="item-title">沙茶麵</div><div class="item-sub">推薦：烏糖沙茶麵（可用關鍵字搜尋）</div></div>
        <div class="actions"><a class="btn" href="https://uri.amap.com/search?keyword=乌糖沙茶面&city=厦门&view=map&src=xiamen-trip-app">導航</a></div>
      </li>
      <li>
        <div><div class="item-title">海蠣煎</div><div class="item-sub">推薦：中山路夜市周邊</div></div>
        <div class="actions"><a class="btn" href="https://uri.amap.com/search?keyword=海蛎煎&city=厦门&view=map&src=xiamen-trip-app">搜尋</a></div>
      </li>
      <li>
        <div><div class="item-title">花生湯</div><div class="item-sub">推薦：黃則和花生湯店</div></div>
        <div class="actions"><a class="btn" href="https://uri.amap.com/search?keyword=黄则和花生汤&city=厦门&view=map&src=xiamen-trip-app">導航</a></div>
      </li>
      <li>
        <div><div class="item-title">燒肉粽</div><div class="item-sub">推薦：1980燒肉粽</div></div>
        <div class="actions"><a class="btn" href="https://uri.amap.com/search?keyword=1980烧肉粽&city=厦门&view=map&src=xiamen-trip-app">導航</a></div>
      </li>
      <li>
        <div><div class="item-title">土筍凍</div><div class="item-sub">老字號很多，可就近挑評價高的</div></div>
        <div class="actions"><a class="btn" href="https://uri.amap.com/search?keyword=土笋冻&city=厦门&view=map&src=xiamen-trip-app">搜尋</a></div>
      </li>
      <li>
        <div><div class="item-title">海鮮砂鍋粥</div><div class="item-sub">推薦：小眼鏡大排檔</div></div>
        <div class="actions"><a class="btn" href="https://uri.amap.com/search?keyword=小眼镜大排档&city=厦门&view=map&src=xiamen-trip-app">導航</a></div>
      </li>
    </ul>
  </div>

  <div class="footer-nav">
    <a class="btn secondary" href="index.html">← 回首頁</a>
    <span class="small">可離線瀏覽</span>
  </div>
</div>
</body>
</html>
