<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>行程｜小黑的愛心之廈門自由行助手</title>

<link rel="stylesheet" href="style.css?v=20260305" />

<style>
.day-wrap{ margin-bottom:14px; }

.day-card{
  background:#fff;
  border-radius:16px;
  padding:12px;
  box-shadow:0 2px 8px rgba(0,0,0,0.05);
  transition: transform .06s ease, outline .06s ease, background .06s ease;
}
.day-card.drag-target{
  outline:2px dashed rgba(0,122,255,0.45);
  background:rgba(0,122,255,0.05);
}

.day-head{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:12px;
}

.day-title{
  font-weight:900;
  font-size:16px;
  line-height:1.25;
}

.day-sub{
  margin-top:4px;
  color:#64748b;
  font-size:12px;
  line-height:1.35;
}

.day-actions{ display:flex; gap:8px; flex-wrap:wrap; }

.sortable{
  list-style:none;
  padding:0;
  margin:12px 0 0;
}

.spot-item{
  display:flex;
  gap:10px;
  align-items:flex-start;
  padding:12px;
  border-radius:14px;
  background:rgba(2,6,23,0.03);
  border:1px solid rgba(15,23,42,0.07);
  margin-top:10px;
}

.handle{
  width:34px;
  height:34px;
  border-radius:12px;
  border:1px solid rgba(15,23,42,0.10);
  background:rgba(255,255,255,0.9);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:900;
  user-select:none;
  touch-action:none;
}

.spot-main{ flex:1; min-width:0; }

.spot-name{
  font-weight:900;
  font-size:14px;
  line-height:1.25;
  overflow-wrap:anywhere;
  word-break:break-word;
}

.spot-note{
  margin-top:4px;
  font-size:12px;
  color:#475569;
  line-height:1.35;
  overflow-wrap:anywhere;
  word-break:break-word;
}

.spot-tags{
  margin-top:8px;
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.tag{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:6px 10px;
  border-radius:999px;
  border:1px solid rgba(15,23,42,0.10);
  background:rgba(255,255,255,0.85);
  font-size:12px;
  text-decoration:none;
  color:#0f172a;
}

.tag.danger{
  color:#b91c1c;
  border-color:rgba(185,28,28,0.25);
  background:rgba(185,28,28,0.06);
}

.empty-note{ margin-top:10px; color:#64748b; font-size:12px; }
.drop-hint{ margin-top:10px; color:#64748b; font-size:12px; }

.placeholder{
  height:54px;
  border-radius:14px;
  border:2px dashed rgba(0,122,255,0.35);
  background:rgba(0,122,255,0.06);
  margin-top:10px;
}

.drag-ghost{
  position:fixed;
  z-index:9999;
  pointer-events:none;
  transform: translate(-50%, -50%);
  width:min(520px, calc(100vw - 24px));
  box-shadow:0 18px 44px rgba(0,0,0,0.18);
  opacity:0.98;
}

/* Tab Bar 備援 */
body{ padding-bottom:92px; }
.tabbar{
  position:fixed; left:0; right:0; bottom:0;
  padding:10px 12px 14px;
  background:rgba(255,255,255,.78);
  backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px);
  border-top:1px solid rgba(15,23,42,.07);
  z-index:999;
}
.tabbar .tabs{
  max-width:860px; margin:0 auto;
  display:grid; grid-template-columns:repeat(4,1fr); gap:8px;
}
.tabbar a{
  text-decoration:none;
  color:#64748b;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:4px; padding:8px 6px; border-radius:14px;
}
.tabbar a:active{ background:rgba(0,0,0,.06); }
.tabbar .icon{ font-size:18px; line-height:1; }
.tabbar .label{ font-size:11px; font-weight:800; letter-spacing:.2px; }
.tabbar a.active{
  color:#007aff;
  background:rgba(0,122,255,.10);
  border:1px solid rgba(0,122,255,.15);
}
</style>
</head>

<body>
<header>📅 行程（可拖曳排序）</header>

<div class="container">
  <div class="card">
    <h2>使用方式</h2>
    <p class="small">
      長按每個景點左側「☰」約 0.25 秒開始拖曳。<br>
      可拖曳排序，也可拖到其他天（包含拖到「Day 標題區」）完成跨天移動。<br>
      變更會自動儲存，主頁摘要會同步更新。
    </p>
  </div>

  <div id="days"></div>

  <div class="footer-nav">
    <a class="btn secondary" href="index.html">← 回首頁</a>
    <span class="small">已自動儲存</span>
  </div>
</div>

<nav class="tabbar">
  <div class="tabs">
    <a href="index.html"><div class="icon">🏠</div><div class="label">首頁</div></a>
    <a class="active" href="itinerary.html"><div class="icon">📅</div><div class="label">行程</div></a>
    <a href="transport.html"><div class="icon">🚇</div><div class="label">交通</div></a>
    <a href="medical.html"><div class="icon">🏥</div><div class="label">醫療</div></a>
  </div>
</nav>

<script>
(() => {
  const KEY_V2 = "xiamen_itinerary_v2";
  const KEY_OLD_CUSTOM = "xiamen_custom_spots_v1";
  const CHANNEL_NAME = "xiamen-trip-app";
  const bc = ("BroadcastChannel" in window) ? new BroadcastChannel(CHANNEL_NAME) : null;

  function notifyUpdated(){
    try { bc && bc.postMessage({ type:"itinerary-updated", at: Date.now() }); } catch {}
  }

  const dayMeta = [
    { day: 1, title: "Day 1：抵達廈門與中山路之夜", sub: "中山路／八市／演武大橋夜景" },
    { day: 2, title: "Day 2：鼓浪嶼與高空全景", sub: "鼓浪嶼／鐘鼓索道／沙坡尾" },
    { day: 3, title: "Day 3：學術氣息與網紅植物園", sub: "南普陀／廈大／植物園／環島路" },
    { day: 4, title: "Day 4：最後巡禮與返程", sub: "貓街或鐵路公園／回程" },
  ];

  const baseInit = {
    1: [
      { name:"飯店入住", note:"抵達後先辦理入住/放行李", city:"厦门" },
      { name:"中山路步行街", note:"晚餐/逛街/小吃", city:"厦门" },
      { name:"八市（第八市場）", note:"在地小吃集中地", city:"厦门" },
      { name:"演武大橋觀景平台", note:"夕陽與雙子塔夜景", city:"厦门" },
    ],
    2: [
      { name:"鼓浪嶼", note:"建議早起出發，旺季需提前訂票", city:"厦门" },
      { name:"鐘鼓索道", note:"俯瞰海景與城市視野", city:"厦门" },
      { name:"沙坡尾", note:"咖啡店/港灣氛圍/夜景", city:"厦门" },
    ],
    3: [
      { name:"南普陀寺", note:"香火鼎盛，建議早上前往", city:"厦门" },
      { name:"廈門大學", note:"需預約，看上弦場/芙蓉隧道", city:"厦门" },
      { name:"廈門植物園", note:"雨林噴霧/多肉區必拍", city:"厦门" },
      { name:"環島路", note:"傍晚騎行/散步", city:"厦门" },
      { name:"曾厝垵", note:"晚餐/文青小店", city:"厦门" },
    ],
    4: [
      { name:"頂澳仔貓街", note:"二選一：貓街或鐵路文化公園", city:"厦门" },
      { name:"鐵路文化公園", note:"二選一：散步拍照", city:"厦门" },
      { name:"前往廈門五通碼頭", note:"建議預留時間（塞車/排隊）", city:"厦门" },
      { name:"返回金門水頭碼頭", note:"銜接飛機請預留緩衝", city:"金门" },
      { name:"前往金門機場", note:"辦理登機", city:"金门" },
    ],
  };

  function uid() { return "id_" + Math.random().toString(16).slice(2) + Date.now().toString(16); }

  function amapUrl(keyword, city) {
    const q = encodeURIComponent(keyword || "");
    const c = encodeURIComponent(city || "厦门");
    return `https://uri.amap.com/search?keyword=${q}&city=${c}&view=map&src=xiamen-trip-app`;
  }

  function loadV2() {
    try { return JSON.parse(localStorage.getItem(KEY_V2) || "null"); }
    catch { return null; }
  }

  function saveV2(data) {
    localStorage.setItem(KEY_V2, JSON.stringify(data));
    notifyUpdated(); // ✅ 每次儲存都通知首頁同步
  }

  function loadOldCustom() {
    try { return JSON.parse(localStorage.getItem(KEY_OLD_CUSTOM) || "{}"); }
    catch { return {}; }
  }

  function ensureInit() {
    const existing = loadV2();
    if (existing && typeof existing === "object") return existing;

    const data = {};
    for (const d of dayMeta) data[d.day] = (baseInit[d.day] || []).map(x => ({ id: uid(), ...x }));

    const old = loadOldCustom();
    for (let day = 1; day <= 4; day++) {
      const arr = Array.isArray(old[day]) ? old[day] : [];
      arr.forEach(x => {
        if (!x || !x.name) return;
        data[day].push({ id: uid(), name:String(x.name), note:x.note?String(x.note):"你新增的景點", city:x.city?String(x.city):"厦门" });
      });
    }

    saveV2(data);
    return data;
  }

  function escapeHtml(s) {
    return String(s)
      .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
      .replaceAll('"',"&quot;").replaceAll("'","&#39;");
  }

  function render() {
    const data = ensureInit();
    const root = document.getElementById("days");
    root.innerHTML = "";

    dayMeta.forEach(meta => {
      const wrap = document.createElement("div");
      wrap.className = "day-wrap";

      const card = document.createElement("div");
      card.className = "day-card";
      card.dataset.dropDay = String(meta.day);

      const head = document.createElement("div");
      head.className = "day-head";

      const left = document.createElement("div");
      left.innerHTML = `
        <div class="day-title">${meta.title}</div>
        <div class="day-sub">${meta.sub}</div>
        <div class="drop-hint">提示：長按 ☰ 0.25 秒拖曳／可拖到其他天（含標題區）</div>
      `;

      const actions = document.createElement("div");
      actions.className = "day-actions";
      actions.innerHTML = `
        <button class="btn" type="button" data-add="${meta.day}">＋ 新增景點</button>
        <button class="btn secondary" type="button" data-reset="${meta.day}">重設當天</button>
      `;

      head.appendChild(left);
      head.appendChild(actions);

      const ul = document.createElement("ul");
      ul.className = "sortable";
      ul.dataset.day = String(meta.day);

      const list = Array.isArray(data[meta.day]) ? data[meta.day] : [];
      if (!list.length) {
        ul.innerHTML = `<div class="empty-note">尚無景點</div>`;
      } else {
        list.forEach(item => {
          const li = document.createElement("li");
          li.className = "spot-item";
          li.dataset.id = item.id;
          li.innerHTML = `
            <div class="handle" title="長按拖曳">☰</div>
            <div class="spot-main">
              <div class="spot-name">${escapeHtml(item.name)}</div>
              <div class="spot-note">${escapeHtml(item.note || "")}</div>
              <div class="spot-tags">
                <a class="tag" target="_blank" rel="noopener" href="${amapUrl(item.name, item.city)}">導航 →</a>
                <button class="tag danger" type="button" data-del="${item.id}">刪除</button>
              </div>
            </div>
          `;
          ul.appendChild(li);
        });
      }

      card.appendChild(head);
      card.appendChild(ul);
      wrap.appendChild(card);
      root.appendChild(wrap);
    });

    bindButtons();
    bindDragAndDrop();
  }

  function bindButtons() {
    document.querySelectorAll("[data-add]").forEach(btn => {
      btn.onclick = () => {
        const day = Number(btn.dataset.add);
        const name = prompt("新增景點名稱：");
        if (!name) return;
        const note = prompt("簡介（可空白）：") || "";
        const city = prompt("城市（預設：厦门，可填 金门）：", "厦门") || "厦门";

        const data = ensureInit();
        data[day] = data[day] || [];
        data[day].push({ id: uid(), name: name.trim(), note: note.trim(), city: city.trim() });
        saveV2(data);
        render();
      };
    });

    document.querySelectorAll("[data-reset]").forEach(btn => {
      btn.onclick = () => {
        const day = Number(btn.dataset.reset);
        if (!confirm("要重設此天為預設行程嗎？（會清掉你在這一天新增/調整的順序）")) return;
        const data = ensureInit();
        data[day] = (baseInit[day] || []).map(x => ({ id: uid(), ...x }));
        saveV2(data);
        render();
      };
    });

    document.querySelectorAll("[data-del]").forEach(btn => {
      btn.onclick = () => {
        const id = btn.dataset.del;
        if (!confirm("刪除此景點？")) return;

        const data = ensureInit();
        for (let day = 1; day <= 4; day++) data[day] = (data[day] || []).filter(x => x.id !== id);
        saveV2(data);
        render();
      };
    });
  }

  // ===== 拖曳排序（長按0.25秒 + Day高亮 + 標題可放） =====
  let dragging = null;
  let pressTimer = null;
  let pressStart = null;

  function clearTargets() {
    document.querySelectorAll(".day-card").forEach(x => x.classList.remove("drag-target"));
  }

  function bindDragAndDrop() {
    document.querySelectorAll(".handle").forEach(handle => {
      handle.onpointerdown = (e) => {
        e.preventDefault();

        const li = handle.closest(".spot-item");
        const ul = handle.closest(".sortable");
        if (!li || !ul) return;

        const id = li.dataset.id;
        const fromDay = Number(ul.dataset.day);

        pressStart = { x: e.clientX, y: e.clientY };
        pressTimer = setTimeout(() => {
          pressTimer = null;
          startDrag(e, { id, fromDay, li, ul });
        }, 250);

        const cancelPress = () => {
          if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
          window.removeEventListener("pointerup", cancelPress);
          window.removeEventListener("pointermove", cancelOnMove);
        };

        const cancelOnMove = (ev) => {
          if (!pressStart) return;
          const dx = Math.abs(ev.clientX - pressStart.x);
          const dy = Math.abs(ev.clientY - pressStart.y);
          if (dx > 10 || dy > 10) cancelPress();
        };

        window.addEventListener("pointerup", cancelPress, { once: true });
        window.addEventListener("pointermove", cancelOnMove);
      };
    });
  }

  function startDrag(e, ctx) {
    clearTargets();

    const rect = ctx.li.getBoundingClientRect();
    const ghost = ctx.li.cloneNode(true);
    ghost.classList.add("drag-ghost");
    ghost.style.width = rect.width + "px";

    const placeholder = document.createElement("div");
    placeholder.className = "placeholder";

    ctx.li.parentNode.insertBefore(placeholder, ctx.li.nextSibling);
    ctx.li.style.display = "none";
    document.body.appendChild(ghost);

    dragging = { id: ctx.id, fromDay: ctx.fromDay, li: ctx.li, ghost, placeholder, overUl: ctx.ul, overDay: ctx.fromDay };
    moveGhost(e.clientX, e.clientY);

    window.addEventListener("pointermove", onMove, { passive:false });
    window.addEventListener("pointerup", onUp, { passive:false, once:true });
  }

  function moveGhost(x, y) {
    if (!dragging) return;
    dragging.ghost.style.left = x + "px";
    dragging.ghost.style.top = y + "px";
  }

  function resolveTargetByPoint(x, y) {
    const el = document.elementFromPoint(x, y);
    if (!el) return null;

    const dayCard = el.closest(".day-card[data-drop-day]");
    if (dayCard) {
      const day = Number(dayCard.dataset.dropDay);
      const ul = dayCard.querySelector(`.sortable[data-day="${day}"]`);
      return { dayCard, day, ul };
    }

    const ul = el.closest(".sortable");
    if (ul) {
      const day = Number(ul.dataset.day);
      const dayCard2 = ul.closest(".day-card[data-drop-day]");
      return { dayCard: dayCard2, day, ul };
    }

    return null;
  }

  function onMove(e) {
    if (!dragging) return;
    e.preventDefault();
    moveGhost(e.clientX, e.clientY);

    const t = resolveTargetByPoint(e.clientX, e.clientY);
    if (!t || !t.ul) return;

    dragging.overDay = t.day;
    dragging.overUl = t.ul;

    clearTargets();
    if (t.dayCard) t.dayCard.classList.add("drag-target");

    const items = [...t.ul.querySelectorAll(".spot-item")].filter(x => x.style.display !== "none");
    let inserted = false;

    for (const item of items) {
      const r = item.getBoundingClientRect();
      const mid = r.top + r.height / 2;
      if (e.clientY < mid) {
        t.ul.insertBefore(dragging.placeholder, item);
        inserted = true;
        break;
      }
    }
    if (!inserted) t.ul.appendChild(dragging.placeholder);
  }

  function onUp() {
    if (!dragging) return;
    window.removeEventListener("pointermove", onMove);
    clearTargets();

    const targetUl = dragging.overUl || dragging.placeholder.closest(".sortable");
    const toDay = Number(targetUl.dataset.day);

    dragging.li.style.display = "";
    targetUl.insertBefore(dragging.li, dragging.placeholder);

    dragging.ghost.remove();
    dragging.placeholder.remove();

    const data = ensureInit();
    const fromDay = dragging.fromDay;

    let moved = null;
    for (let d = 1; d <= 4; d++) {
      const idx = (data[d] || []).findIndex(x => x.id === dragging.id);
      if (idx >= 0) { moved = data[d][idx]; data[d].splice(idx, 1); break; }
    }
    if (!moved) { dragging = null; render(); return; }

    const idsInTo = [...targetUl.querySelectorAll(".spot-item")].map(li => li.dataset.id);

    const oldTo = data[toDay] || [];
    if (!oldTo.find(x => x.id === moved.id)) oldTo.push(moved);
    data[toDay] = oldTo;
    data[toDay] = idsInTo.map(id => data[toDay].find(x => x.id === id)).filter(Boolean);

    const fromUl = document.querySelector(`.sortable[data-day="${fromDay}"]`);
    if (fromUl && fromDay !== toDay) {
      const idsInFrom = [...fromUl.querySelectorAll(".spot-item")].map(li => li.dataset.id);
      data[fromDay] = idsInFrom.map(id => (data[fromDay]||[]).find(x => x.id === id)).filter(Boolean);
    }

    saveV2(data);
    dragging = null;
    render();
  }

  render();
})();
</script>

</body>
</html>
