<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>廈門景點地圖</title>

<style>

#map{
width:100%;
height:100vh;
}

body{
margin:0;
font-family:-apple-system;
}

</style>

</head>

<body>

<div id="map"></div>

<script src="https://webapi.amap.com/maps?v=2.0&key=你的key"></script>

<script>

var map = new AMap.Map('map',{
zoom:12,
center:[118.0894,24.4798]
});

var spots = [

{name:"中山路步行街",pos:[118.0894,24.457]},

{name:"沙坡尾",pos:[118.095,24.441]},

{name:"南普陀寺",pos:[118.097,24.444]},

{name:"曾厝垵",pos:[118.127,24.425]}

];

spots.forEach(function(s){

var marker = new AMap.Marker({
position:s.pos,
title:s.name
});

marker.on("click",function(){

window.open("https://uri.amap.com/navigation")

});

map.add(marker);

});

</script>

</body>
</html>
