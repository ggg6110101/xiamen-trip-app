<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>小黑的愛心之廈門自由行助手</title>

<link rel="stylesheet" href="style.css?v=20260306">

<style>
/* TabBar 備援（避免快取造成跑版） */
body{ padding-bottom:92px; }
.tabbar{
  position:fixed; left:0; right:0; bottom:0;
  padding:10px 12px 14px;
  background:rgba(255,255,255,.78);
  backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px);
  border-top:1px solid rgba(15,23,42,.07);
  z-index:999;
}
.tabbar .tabs{
  max-width:860px; margin:0 auto;
  display:grid; grid-template-columns:repeat(4,1fr); gap:8px;
}
.tabbar a{
  text-decoration:none;
  color:#64748b;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:4px; padding:8px 6px; border-radius:14px;
}
.tabbar a:active{ background:rgba(0,0,0,.06); }
.tabbar .icon{ font-size:18px; line-height:1; }
.tabbar .label{ font-size:11px; font-weight:800; letter-spacing:.2px; }
.tabbar a.active{
  color:#007aff;
  background:rgba(0,122,255,.10);
  border:1px solid rgba(0,122,255,.15);
}

/* Apple 風格摘要卡片 */
.day-card{
  background:#fff;
  border-radius:16px;
  padding:14px;
  margin-top:10px;
  box-shadow:0 2px 8px rgba(0,0,0,0.05);
}
.day-title{
  font-weight:900;
  font-size:15px;
  line-height:1.25;
}
.day-spot{
  margin-top:6px;
  font-size:13px;
  color:#334155;
  overflow-wrap:anywhere;
  word-break:break-word;
}

/* 可選：更新提示小條（不擋畫面） */
.update-toast{
  position:fixed;
  left:12px; right:12px;
  bottom:104px;
  z-index:1000;
  background:rgba(15,23,42,.92);
  color:#fff;
  border-radius:14px;
  padding:10px 12px;
  font-size:12px;
  display:none;
}
</style>
</head>

<body>

<header>❤️ 小黑的愛心之廈門自由行助手</header>

<div class="container">

  <div class="card">
    <h2>行程摘要</h2>
    <div id="itinerarySummary"></div>
  </div>

  <div class="card">
    <h2>功能</h2>
    <div class="app-grid">
      <a href="itinerary.html"><div class="app-icon">📅</div><div class="app-label">行程</div></a>
      <a href="food.html"><div class="app-icon">🍜</div><div class="app-label">美食</div></a>
      <a href="hotel.html"><div class="app-icon">🏨</div><div class="app-label">飯店</div></a>
      <a href="transport.html"><div class="app-icon">🚇</div><div class="app-label">交通</div></a>
      <a href="taxi.html"><div class="app-icon">🚕</div><div class="app-label">叫車</div></a>
      <a href="souvenir.html"><div class="app-icon">🎁</div><div class="app-label">名產</div></a>
      <a href="medical.html"><div class="app-icon">🏥</div><div class="app-label">醫療</div></a>
      <a href="tips.html"><div class="app-icon">⚠</div><div class="app-label">注意</div></a>
    </div>
  </div>

</div>

<div id="updateToast" class="update-toast">偵測到更新，正在套用新版…</div>

<nav class="tabbar">
  <div class="tabs">
    <a class="active" href="index.html"><div class="icon">🏠</div><div class="label">首頁</div></a>
    <a href="itinerary.html"><div class="icon">📅</div><div class="label">行程</div></a>
    <a href="transport.html"><div class="icon">🚇</div><div class="label">交通</div></a>
    <a href="medical.html"><div class="icon">🏥</div><div class="label">醫療</div></a>
  </div>
</nav>

<script>
(() => {
  /* ========= 行程摘要同步 ========= */
  const KEY_V2 = "xiamen_itinerary_v2";
  const CHANNEL_NAME = "xiamen-trip-app";

  const dayMeta = [
    { day: 1, title: "Day 1：抵達廈門與中山路之夜" },
    { day: 2, title: "Day 2：鼓浪嶼與高空全景" },
    { day: 3, title: "Day 3：學術氣息與網紅植物園" },
    { day: 4, title: "Day 4：最後巡禮與返程" },
  ];

  function loadV2() {
    try { return JSON.parse(localStorage.getItem(KEY_V2) || "null"); }
    catch { return null; }
  }

  function esc(s){
    return String(s)
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#39;");
  }

  function renderSummary() {
    const wrap = document.getElementById("itinerarySummary");
    const data = loadV2();
    wrap.innerHTML = "";

    if (!data) {
      wrap.innerHTML = `<div class="small">尚未建立行程資料，請先進入「行程」頁面一次。</div>`;
      return;
    }

    dayMeta.forEach(d => {
      const list = Array.isArray(data[d.day]) ? data[d.day] : [];
      const card = document.createElement("div");
      card.className = "day-card";

      let html = `<div class="day-title">${esc(d.title)}</div>`;
      if (!list.length) {
        html += `<div class="day-spot">（尚無景點）</div>`;
      } else {
        list.forEach(item => html += `<div class="day-spot">📍 ${esc(item.name)}</div>`);
      }

      card.innerHTML = html;
      wrap.appendChild(card);
    });
  }

  document.addEventListener("DOMContentLoaded", renderSummary);
  window.addEventListener("pageshow", renderSummary);
  window.addEventListener("focus", renderSummary);
  document.addEventListener("visibilitychange", () => {
    if (!document.hidden) renderSummary();
  });

  if ("BroadcastChannel" in window) {
    const bc = new BroadcastChannel(CHANNEL_NAME);
    bc.onmessage = (ev) => {
      if (ev && ev.data && ev.data.type === "itinerary-updated") renderSummary();
    };
  }

  /* ========= Service Worker 自動更新（避免快取卡住） ========= */
  const toast = document.getElementById("updateToast");
  const showToast = (msg) => {
    if (!toast) return;
    toast.textContent = msg || "偵測到更新，正在套用新版…";
    toast.style.display = "block";
  };
  const hideToast = () => {
    if (!toast) return;
    toast.style.display = "none";
  };

  // 避免同一次更新無限重整：用 sessionStorage 記一次
  const RELOAD_GUARD_KEY = "sw_reloaded_once";

  async function registerAndAutoUpdateSW() {
    if (!("serviceWorker" in navigator)) return;

    try {
      // register
      const reg = await navigator.serviceWorker.register("sw.js");

      // 每次開啟頁面都主動檢查更新（最重要）
      if (reg && reg.update) {
        try { await reg.update(); } catch {}
      }

      // 偵測到新 worker
      reg.addEventListener("updatefound", () => {
        const newWorker = reg.installing;
        if (!newWorker) return;

        newWorker.addEventListener("statechange", () => {
          // 新 SW 安裝完成（waiting）
          if (newWorker.state === "installed") {
            // 若已有舊 SW 在控制頁面，代表這次確實有更新
            if (navigator.serviceWorker.controller) {
              showToast("偵測到更新，正在套用新版…");
              try { newWorker.postMessage("SKIP_WAITING"); } catch {}
            }
          }
        });
      });

      // 一旦 controller 變更（新 SW 接管），就刷新一次拿最新資源
      navigator.serviceWorker.addEventListener("controllerchange", () => {
        // 防止重整迴圈
        if (sessionStorage.getItem(RELOAD_GUARD_KEY) === "1") return;
        sessionStorage.setItem(RELOAD_GUARD_KEY, "1");
        showToast("已套用新版，正在刷新…");
        location.reload();
      });

      // 首次安裝（沒有 controller）也不用刷新
      hideToast();

    } catch (err) {
      // SW 註冊失敗不影響使用
      hideToast();
    }
  }

  registerAndAutoUpdateSW();

})();
</script>

</body>
</html>
