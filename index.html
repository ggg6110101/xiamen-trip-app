  body{ padding-bottom:92px; }

  .tabbar a{

  .tabbar a.active{

    background:rgba(0,122,255,.10);
    border:1px solid rgba(0,122,255,.15);
  }
</style>

<body>

<header>❤️ 小黑的愛心之廈門自由行助手</header>

<div class="container">

  <div class="card">

  <div class="card">

<nav class="tabbar">
  <div class="tabs">
    <a class="active" href="index.html"><div class="icon">🏠</div><div class="label">首頁</div></a>

  </div>
</nav>

<script>
(() => {
  const STORAGE_KEY = "xiamen_custom_spots_v1";

  // ✅ 預設行程（與 itinerary.html 一致）
  const base = [
    { day: "Day 1", title: "抵達廈門與中山路之夜", spots: ["中山路步行街", "八市（第八市場）", "演武大橋觀景平台", "雙子塔（世茂海峽大廈）"] },
    { day: "Day 2", title: "鼓浪嶼與高空全景", spots: ["鼓浪嶼", "鐘鼓索道", "沙坡尾"] },
    { day: "Day 3", title: "學術氣息與網紅植物園", spots: ["南普陀寺", "廈門大學", "廈門植物園", "環島路", "曾厝垵"] },
    { day: "Day 4", title: "最後巡禮與返程回高", spots: ["頂澳仔貓街", "鐵路文化公園", "廈門五通碼頭", "金門水頭碼頭", "金門機場"] },
  ];

  function loadCustom() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}"); }
    catch { return {}; }
  }

  function renderSummary() {
    const container = document.getElementById("itinerarySummary");
    const custom = loadCustom();

    container.innerHTML = "";

    base.forEach((d, idx) => {
      const dayNum = idx + 1;
      const extra = (custom[dayNum] || []).map(x => x && x.name ? x.name : null).filter(Boolean);

      const card = document.createElement("div");
      card.className = "day-card";

      let html = `
        <div class="day-title">${d.day}｜${d.title}</div>
      `;

      // base spots
      d.spots.forEach(name => {
        html += `<div class="day-spot">📍 ${name}</div>`;
      });

      // custom spots
      if (extra.length) {
        html += `<div class="day-spot" style="margin-top:8px; font-weight:800;">你新增的景點</div>`;
        extra.forEach(name => {
          html += `<div class="day-spot">✨ ${name}</div>`;
        });
      }

      card.innerHTML = html;
      container.appendChild(card);
    });
  }

  renderSummary();
})();
</script>

</body>
