function renderSummary(){

const container=document.getElementById("itinerarySummary")

const itinerary=JSON.parse(localStorage.getItem("itineraryData")||"{}")

container.innerHTML=""

Object.keys(itinerary).forEach(day=>{

const spots=itinerary[day]

const card=document.createElement("div")

card.className="day-card"

let html=`<div class="day-title">${day}</div>`

spots.forEach(spot=>{

html+=`<div class="day-spot">📍 ${spot.name}</div>`

})

card.innerHTML=html

container.appendChild(card)

})

}

renderSummary()

</script></body>
